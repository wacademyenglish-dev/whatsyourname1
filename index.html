<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wolf Labs | A1 Node 01: Identity Core</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        spotify: '#1DB954',
                        spotifyHover: '#1ed760',
                        base: '#121212',
                        surface: '#181818',
                        surfaceHover: '#282828',
                        subtext: '#B3B3B3',
                    },
                    fontFamily: {
                        header: ['Montserrat', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #121212;
            color: #FFFFFF;
            overflow-x: hidden;
            user-select: none;
        }

        /* Premium App Cards */
        .glass-panel {
            background: #181818;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            transition: background-color 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        /* Spotify Style Buttons */
        .btn-primary {
            background-color: #1DB954;
            color: #000000;
            border-radius: 9999px; /* full rounded */
            font-weight: 700;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-primary:hover:not(:disabled) {
            background-color: #1ed760;
            transform: scale(1.04);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background-color: #181818;
            color: #B3B3B3;
        }

        .btn-secondary {
            background-color: transparent;
            color: #FFFFFF;
            border: 1px solid #727272;
            border-radius: 9999px;
            font-weight: 700;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .btn-secondary:hover:not(:disabled) {
            border-color: #FFFFFF;
            transform: scale(1.04);
        }

        .btn-surface {
            background-color: #282828;
            color: #FFFFFF;
            border-radius: 9999px;
            font-weight: 600;
            transition: all 0.2s ease;
        }
        .btn-surface:hover {
            background-color: #3E3E3E;
        }

        /* Animations */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); }
            40%, 80% { transform: translateX(5px); }
        }
        .animate-error {
            animation: shake 0.4s ease-in-out;
            border-color: #E50914 !important;
        }
        
        .jit-word {
            position: relative;
            color: #FFFFFF;
            font-weight: 700;
            cursor: pointer;
            transition: color 0.2s;
            border-bottom: 2px dotted #1DB954;
        }
        .jit-word:hover {
            color: #1DB954;
        }

        .drawer {
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* HUD Bars */
        .bar-container { width: 120px; height: 6px; background: #333333; border-radius: 9999px; overflow: hidden; }
        .bar-fill { height: 100%; transition: width 0.3s ease; border-radius: 9999px; }
        .hp-fill { background-color: #E50914; }
        .xp-fill { background-color: #1DB954; }
        
        /* Drag n Drop / Ordering */
        .word-chip {
            display: inline-block;
            padding: 10px 20px;
            margin: 6px;
            background: #282828;
            border: 1px solid transparent;
            border-radius: 9999px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
            z-index: 10;
        }
        .word-chip:hover {
            background: #3E3E3E;
        }
        .word-chip.selected {
            background: rgba(29, 185, 84, 0.1);
            border-color: #1DB954;
            color: #1DB954;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #121212; }
        ::-webkit-scrollbar-thumb { background: #333333; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #555555; }

        /* Floating Background Orbs */
        .bg-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(120px);
            z-index: 0;
            pointer-events: none;
            animation: float 20s infinite ease-in-out alternate;
        }
        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(30px, -50px) scale(1.1); }
        }

        /* Whiteboard Tools */
        .tool-active {
            box-shadow: 0 0 0 2px #1DB954;
            transform: scale(1.1);
        }

        /* Watermark Icon */
        .watermark-icon {
            position: absolute;
            right: -10%;
            bottom: -20%;
            font-size: 200px;
            color: rgba(255, 255, 255, 0.03);
            pointer-events: none;
            z-index: 0;
            transform: rotate(-15deg);
        }
    </style>
</head>
<body class="font-body antialiased min-h-screen flex flex-col bg-gradient-to-br from-[#121212] to-[#0a0a0a]">

    <!-- Ambient Background Orbs -->
    <div class="bg-orb w-[500px] h-[500px] bg-spotify/10 top-[-10%] left-[-10%]"></div>
    <div class="bg-orb w-[600px] h-[600px] bg-blue-500/5 bottom-[-20%] right-[-10%]" style="animation-delay: -5s;"></div>

    <!-- HUD Header (Premium Transparent Navbar) -->
    <header class="fixed top-0 w-full z-40 bg-black/60 backdrop-blur-md border-b border-white/5 px-6 py-4 flex justify-between items-center transition-all">
        <div class="flex items-center gap-4">
            <div class="text-white font-header font-extrabold text-2xl tracking-tight flex items-center">
                <i class="fa-solid fa-graduation-cap text-spotify mr-3 text-2xl"></i>WOLF LABS
            </div>
            <!-- Actions -->
            <div class="hidden md:flex items-center gap-4 ml-6 border-l border-white/10 pl-6">
                <button onclick="toggleWhiteboard()" class="text-xs text-subtext hover:text-white uppercase tracking-widest transition font-bold flex items-center">
                    <i class="fa-solid fa-chalkboard mr-2"></i> Whiteboard
                </button>
                <button onclick="toggleFullScreen()" class="text-xs text-subtext hover:text-white uppercase tracking-widest transition font-bold flex items-center" id="btn-fullscreen">
                    <i class="fa-solid fa-expand mr-2"></i> Fullscreen
                </button>
            </div>
        </div>

        <div class="flex items-center gap-6 md:gap-8">
            <!-- Mobile Actions (Icons only) -->
            <div class="flex md:hidden items-center gap-4 mr-2">
                <button onclick="toggleWhiteboard()" class="text-subtext hover:text-white"><i class="fa-solid fa-chalkboard text-lg"></i></button>
                <button onclick="toggleFullScreen()" class="text-subtext hover:text-white"><i class="fa-solid fa-expand text-lg" id="btn-fullscreen-mobile"></i></button>
            </div>
            <!-- HP Bar -->
            <div class="flex flex-col gap-1 items-end">
                <div class="flex justify-between w-full text-[10px] font-header text-subtext font-bold uppercase tracking-wider">
                    <span><i class="fa-solid fa-heart mr-1"></i> Focus</span>
                    <span id="hp-text" class="text-white">100%</span>
                </div>
                <div class="bar-container w-20 md:w-32"><div id="hp-bar" class="bar-fill hp-fill" style="width: 100%;"></div></div>
            </div>
            <!-- XP Bar -->
            <div class="flex flex-col gap-1 items-end">
                <div class="flex justify-between w-full text-[10px] font-header text-subtext font-bold uppercase tracking-wider">
                    <span><i class="fa-solid fa-bolt mr-1 text-spotify"></i> Fluency</span>
                    <span id="xp-text" class="text-spotify">0</span>
                </div>
                <div class="bar-container w-20 md:w-32"><div id="xp-bar" class="bar-fill xp-fill" style="width: 0%;"></div></div>
            </div>
        </div>
    </header>

    <!-- Main Content Area -->
    <main class="flex-grow pt-28 pb-24 px-4 flex flex-col items-center justify-center relative z-10 w-full max-w-5xl mx-auto min-h-[calc(100vh-160px)]" id="slide-container">
        <!-- Slides will be injected here via JS -->
    </main>

    <!-- Footer / Navigation -->
    <footer class="fixed bottom-0 w-full z-40 bg-black/80 backdrop-blur-lg border-t border-white/5 p-5 flex justify-between items-center px-6">
        <div class="text-sm font-header text-subtext tracking-widest font-bold">
            NODE 01 <span class="text-white mx-3 opacity-30">|</span> <span id="slide-counter" class="text-white">01/30</span>
        </div>
        <div class="flex gap-4">
            <button id="btn-prev" onclick="prevSlide()" class="btn-secondary px-6 py-3 text-sm flex items-center">
                <i class="fa-solid fa-chevron-left mr-2"></i> Back
            </button>
            <button id="btn-next" onclick="nextSlide()" class="btn-primary px-8 py-3 text-sm flex items-center shadow-[0_4px_15px_rgba(29,185,84,0.3)]">
                Next <i class="fa-solid fa-chevron-right ml-2"></i>
            </button>
        </div>
    </footer>

    <!-- Whiteboard Drawer (Left) -->
    <div id="whiteboard-drawer" class="drawer fixed top-0 left-0 w-full md:w-[450px] h-full bg-[#181818] z-50 transform -translate-x-full border-r border-white/5 p-6 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-4 border-b border-white/10 pb-4">
            <h2 class="font-header font-bold text-xl text-white"><i class="fa-solid fa-pen-nib mr-2 text-spotify"></i> WHITEBOARD</h2>
            <button onclick="toggleWhiteboard()" class="text-subtext hover:text-white transition"><i class="fa-solid fa-xmark text-2xl"></i></button>
        </div>
        
        <!-- Whiteboard Controls -->
        <div class="flex items-center gap-4 mb-4 bg-black/30 p-3 rounded-xl border border-white/5">
            <button class="color-btn w-6 h-6 rounded-full bg-white tool-active" onclick="setWBColor('#FFFFFF', this)"></button>
            <button class="color-btn w-6 h-6 rounded-full bg-spotify" onclick="setWBColor('#1DB954', this)"></button>
            <button class="color-btn w-6 h-6 rounded-full bg-[#E50914]" onclick="setWBColor('#E50914', this)"></button>
            <button class="color-btn w-6 h-6 rounded-full bg-[#3b82f6]" onclick="setWBColor('#3b82f6', this)"></button>
            <div class="w-px h-6 bg-white/10 mx-1"></div>
            <button class="btn-surface px-4 py-1.5 text-xs font-bold rounded flex items-center ml-auto" onclick="setWBEraser()"><i class="fa-solid fa-eraser mr-2"></i> Eraser</button>
            <button class="text-subtext hover:text-[#E50914] px-2 py-1 transition" onclick="clearWB()" title="Clear Board"><i class="fa-solid fa-trash"></i></button>
        </div>

        <!-- Canvas Container -->
        <div class="flex-grow bg-[#121212] rounded-xl border border-white/10 relative overflow-hidden" id="canvas-container">
            <canvas id="wb-canvas" class="absolute top-0 left-0 w-full h-full cursor-crosshair touch-none"></canvas>
            <div class="absolute bottom-4 left-0 w-full text-center text-[10px] text-white/20 font-header uppercase tracking-widest pointer-events-none">Wolf Labs • Identity Core</div>
        </div>
    </div>

    <!-- Intel Panel Drawer (Right) -->
    <div id="intel-drawer" class="drawer fixed top-0 right-0 w-full md:w-96 h-full bg-[#181818] z-50 transform translate-x-full border-l border-white/5 p-8 flex flex-col shadow-2xl">
        <div class="flex justify-between items-center mb-8 border-b border-white/10 pb-4">
            <button onclick="closeIntel()" class="text-subtext hover:text-white transition"><i class="fa-solid fa-arrow-right text-2xl"></i></button>
            <h2 class="font-header font-bold text-xl text-white">LEXICON DB <i class="fa-solid fa-database ml-2 text-spotify"></i></h2>
        </div>
        <div class="flex-grow flex flex-col gap-6" id="intel-content">
            <!-- Content injected via JS -->
        </div>
    </div>

    <!-- Custom Modal -->
    <div id="custom-modal" class="fixed inset-0 z-[60] flex items-center justify-center hidden bg-black/80 backdrop-blur-sm">
        <div class="glass-panel p-10 max-w-sm w-full mx-4 text-center transform scale-95 transition-transform duration-300" id="modal-box">
            <i class="fa-solid fa-circle-notch fa-spin text-white/5 watermark-icon" style="font-size: 150px; right: -20px; bottom: -20px;"></i>
            <div id="modal-icon" class="text-5xl mb-6 relative z-10"></div>
            <h3 id="modal-title" class="font-header text-2xl font-black mb-3 tracking-tight relative z-10"></h3>
            <p id="modal-text" class="text-subtext mb-8 text-base leading-relaxed relative z-10"></p>
            <button onclick="closeModal()" id="modal-btn" class="btn-primary w-full py-4 text-sm tracking-widest relative z-10">CONTINUE</button>
        </div>
    </div>

    <script>
        /* --- STATE MANAGEMENT --- */
        let state = {
            hp: 100,
            xp: 0,
            current: 0
        };

        const TOTAL_XP = 1500;
        let slideTimer = null; // For Time-Attack mechanics

        /* --- FULLSCREEN LOGIC --- */
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        document.addEventListener('fullscreenchange', () => {
            const iconDesktop = document.querySelector('#btn-fullscreen i');
            const iconMobile = document.getElementById('btn-fullscreen-mobile');
            if (document.fullscreenElement) {
                if(iconDesktop) { iconDesktop.classList.remove('fa-expand'); iconDesktop.classList.add('fa-compress'); }
                if(iconMobile) { iconMobile.classList.remove('fa-expand'); iconMobile.classList.add('fa-compress'); }
            } else {
                if(iconDesktop) { iconDesktop.classList.remove('fa-compress'); iconDesktop.classList.add('fa-expand'); }
                if(iconMobile) { iconMobile.classList.remove('fa-compress'); iconMobile.classList.add('fa-expand'); }
            }
        });

        /* --- UI FUNCTIONS --- */
        function updateHUD() {
            document.getElementById('hp-bar').style.width = `${Math.max(0, state.hp)}%`;
            document.getElementById('hp-text').innerText = `${Math.max(0, state.hp)}%`;
            if (state.hp <= 20) {
                document.getElementById('hp-bar').style.backgroundColor = '#E50914';
            } else {
                document.getElementById('hp-bar').style.backgroundColor = '#1DB954';
            }
            
            let xpPercent = Math.min(100, (state.xp / TOTAL_XP) * 100);
            document.getElementById('xp-bar').style.width = `${xpPercent}%`;
            document.getElementById('xp-text').innerText = state.xp;

            document.getElementById('slide-counter').innerText = `${String(state.current + 1).padStart(2, '0')}/${slides.length}`;

            // Buttons state
            document.getElementById('btn-prev').disabled = state.current === 0;
            
            if(state.hp <= 0) {
                triggerGameOver();
            }
        }

        function takeDamage(amount, reason = "Syntax Error detected") {
            state.hp -= amount;
            
            // Visual feedback
            const container = document.getElementById('slide-container');
            container.classList.add('animate-error');
            setTimeout(() => container.classList.remove('animate-error'), 400);

            showModal('FOCUS LOST', `-${amount} HP. ${reason}`, 'fa-circle-exclamation text-[#E50914]');
            updateHUD();
        }

        function gainXP(amount, message = "Great job!") {
            state.xp += amount;
            showModal('FLUENCY GAINED', `+${amount} XP. ${message}`, 'fa-circle-check text-spotify');
            updateHUD();
        }

        function triggerGameOver() {
            showModal('SESSION ENDED', 'Your focus reached 0. Take a break and try again.', 'fa-battery-empty text-[#E50914]');
            document.getElementById('modal-btn').innerText = "RESTART";
            document.getElementById('modal-btn').onclick = () => {
                state.hp = 100;
                state.xp = 0;
                state.current = 0;
                closeModal();
                renderSlide();
                document.getElementById('modal-btn').innerText = "CONTINUE";
                document.getElementById('modal-btn').onclick = closeModal;
            };
        }

        function showModal(title, text, iconClass = 'fa-info-circle text-spotify') {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-title').className = `font-header text-2xl font-black mb-3 tracking-tight text-white relative z-10`;
            document.getElementById('modal-text').innerText = text;
            document.getElementById('modal-icon').innerHTML = `<i class="fa-solid ${iconClass}"></i>`;
            
            const modal = document.getElementById('custom-modal');
            modal.classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('modal-box').classList.remove('scale-95');
                document.getElementById('modal-box').classList.add('scale-100');
            }, 10);
        }

        function closeModal() {
            document.getElementById('modal-box').classList.remove('scale-100');
            document.getElementById('modal-box').classList.add('scale-95');
            setTimeout(() => {
                document.getElementById('custom-modal').classList.add('hidden');
            }, 200);
        }

        /* --- DRAWERS & WHITEBOARD LOGIC --- */
        let canvas, ctx;
        let isDrawing = false;
        let wbColor = '#FFFFFF';
        let wbLineWidth = 3;

        function toggleWhiteboard() {
            const drawer = document.getElementById('whiteboard-drawer');
            if (drawer.classList.contains('-translate-x-full')) {
                drawer.classList.remove('-translate-x-full');
                // Resize canvas to match container when opened
                setTimeout(resizeCanvas, 300);
            } else {
                drawer.classList.add('-translate-x-full');
            }
        }

        function initWhiteboard() {
            canvas = document.getElementById('wb-canvas');
            ctx = canvas.getContext('2d');
            
            // Mouse Events
            canvas.addEventListener('mousedown', startDrawing);
            canvas.addEventListener('mousemove', draw);
            canvas.addEventListener('mouseup', stopDrawing);
            canvas.addEventListener('mouseout', stopDrawing);
            
            // Touch Events
            canvas.addEventListener('touchstart', handleTouchStart, {passive: false});
            canvas.addEventListener('touchmove', handleTouchMove, {passive: false});
            canvas.addEventListener('touchend', stopDrawing);
            
            window.addEventListener('resize', () => {
                if(!document.getElementById('whiteboard-drawer').classList.contains('-translate-x-full')) {
                    // Keep drawing data if resizing
                    const tempCanvas = document.createElement('canvas');
                    tempCanvas.width = canvas.width;
                    tempCanvas.height = canvas.height;
                    tempCanvas.getContext('2d').drawImage(canvas, 0, 0);
                    
                    resizeCanvas();
                    ctx.drawImage(tempCanvas, 0, 0);
                }
            });
        }

        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            // Setup context defaults
            ctx.lineCap = 'round';
            ctx.lineJoin = 'round';
        }

        function getCoordinates(e) {
            const rect = canvas.getBoundingClientRect();
            if (e.touches && e.touches.length > 0) {
                return {
                    x: e.touches[0].clientX - rect.left,
                    y: e.touches[0].clientY - rect.top
                };
            }
            return {
                x: e.clientX - rect.left,
                y: e.clientY - rect.top
            };
        }

        function startDrawing(e) {
            isDrawing = true;
            const pos = getCoordinates(e);
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
            
            // Draw a dot on click
            ctx.fillStyle = wbColor;
            ctx.arc(pos.x, pos.y, wbLineWidth / 2, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(pos.x, pos.y);
        }

        function draw(e) {
            if (!isDrawing) return;
            e.preventDefault();
            const pos = getCoordinates(e);
            ctx.strokeStyle = wbColor;
            ctx.lineWidth = wbLineWidth;
            ctx.lineTo(pos.x, pos.y);
            ctx.stroke();
        }

        function handleTouchStart(e) { e.preventDefault(); startDrawing(e); }
        function handleTouchMove(e) { e.preventDefault(); draw(e); }
        function stopDrawing() { isDrawing = false; ctx.beginPath(); }

        function setWBColor(color, btnEl = null) {
            wbColor = color;
            wbLineWidth = 3;
            // Update UI
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('tool-active'));
            if(btnEl) btnEl.classList.add('tool-active');
        }

        function setWBEraser() {
            wbColor = '#121212'; // match background
            wbLineWidth = 20; // bigger eraser
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('tool-active'));
        }

        function clearWB() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function openIntel(word, phonetic, type, def, example, prompt) {
            const drawer = document.getElementById('intel-drawer');
            document.getElementById('intel-content').innerHTML = `
                <div class="mb-6">
                    <h3 class="text-4xl font-header font-black text-white tracking-tight capitalize mb-2">${word}</h3>
                    <p class="text-subtext font-body text-sm font-medium"><span class="text-spotify">${phonetic}</span> • ${type}</p>
                </div>
                
                <div class="space-y-6">
                    <div>
                        <p class="text-white text-xs uppercase tracking-widest font-bold mb-2 opacity-50"><i class="fa-solid fa-book-open mr-1"></i> Definition</p>
                        <p class="text-white text-lg font-medium leading-relaxed">${def}</p>
                    </div>
                    
                    <div class="bg-[#282828] p-5 rounded-xl border border-white/5 relative overflow-hidden">
                        <i class="fa-solid fa-quote-right absolute right-2 bottom-2 text-6xl text-white/5 pointer-events-none"></i>
                        <p class="text-white text-xs uppercase tracking-widest font-bold mb-2 opacity-50 relative z-10"><i class="fa-solid fa-comment-dots mr-1"></i> Example</p>
                        <p class="text-white italic relative z-10">"${example}"</p>
                    </div>
                    
                    <div class="mt-4 p-5 rounded-xl bg-[rgba(29,185,84,0.1)] border border-spotify/30">
                        <p class="text-spotify text-xs uppercase tracking-widest font-bold mb-2"><i class="fa-solid fa-microphone mr-2"></i> Speak Up</p>
                        <p class="text-white text-sm font-medium">${prompt}</p>
                    </div>
                </div>
            `;
            drawer.classList.remove('translate-x-full');
        }

        function closeIntel() {
            document.getElementById('intel-drawer').classList.add('translate-x-full');
        }

        /* --- VOCAB FACTORY --- */
        const vocabHTML = (word, phonetic, type, def, ex, prompt) => 
            `<span class="jit-word" onclick="openIntel('${word}', '${phonetic}', '${type}', '${def}', '${ex}', '${prompt}')">${word}</span>`;

        /* --- SLIDE DATA & FACTORIES --- */
        
        const S_Guide = (title, points) => `
            <div class="w-full glass-panel p-10 md:p-14 relative border-t-4 border-t-spotify">
                <i class="fa-solid fa-chalkboard-user watermark-icon"></i>
                <div class="absolute -top-3 left-8 bg-spotify text-black text-[11px] font-black px-3 py-1 rounded-full uppercase tracking-widest">Instructor Guide</div>
                <h1 class="text-3xl font-header font-black mb-6 text-white tracking-tight relative z-10">${title}</h1>
                <p class="text-subtext mb-8 text-base md:text-lg leading-relaxed relative z-10">Prepare the student for Node 01. The focus is ensuring they understand the basic identification structure naturally.</p>
                <div class="bg-[#282828]/80 backdrop-blur-sm rounded-2xl p-6 mb-8 relative z-10">

                { text: '<i class="fa-solid fa-headphones mr-2 text-spotify"></i> I am ready!', isCorrect: true, feedbackTitle: 'Let\'s go!', feedbackText: 'Focus on the names they say. Do not worry about understanding every single word.' }

            // 08 - TO BE MATRIX TABLE

                { icon: '<div class="w-10 h-10 rounded-full bg-surface border border-white/10 flex items-center justify-center"><i class="fa-solid fa-users text-subtext"></i></div>', person: 'You / We / They', verb: 'are / \'re', example: 'You are ready.' },
                { icon: '<div class="w-10 h-10 rounded-full bg-surface border border-white/10 flex items-center justify-center"><i class="fa-solid fa-user-astronaut text-subtext"></i></div>', person: 'He / She / It', verb: 'is / \'s', example: 'She is Sian.' }

            // 12
            { type: 'grammar', render: () => S_Grammar('fa-person-dress', 'SHE / HER (Female)', 'To talk about a woman: <b class="text-spotify">She is</b> or <b class="text-spotify">Her name is</b>.', [{en: "👩 She is Sian.", desc: "She is = The person"}, {en: "👩 Her name is Sian.", desc: "Her name = The possession"}]) },
            
            // --- THE GAUNTLET (Mechanics) ---
            // 13
            { type: 'mechanic', render: () => Mechanics.BugHunter('g2', "His name are Tim", 2, "is") },
            // 14
            { type: 'mechanic', render: () => Mechanics.Slot('g4', "I", ["am", "is", "are"], "Georgie.", "am") },
            // 15

            // 16

            { type: 'mechanic', render: () => Mechanics.Builder('g9', ["your", "What", "?", "is", "name"]),
              onRender: () => state.builderTarget = "What is your name ?" },

            { type: 'mechanic', render: () => Mechanics.Slot('g10', "", ["He", "His", "She", "Her"], "name is Tim.", "His") },
            // 20

            // 21
            { type: 'mechanic', render: () => Mechanics.Wheel('g12', "You are leaving...", ["Hello!", "Nice to meet you.", "Goodbye!"], 2) },
            
            // --- MORAL SLIDERS ---
            // 22
            { type: 'slider', render: () => Mechanics.Slider('s1', 'Meeting someone at work:', 'I am very formal (Hello)', 'I am relaxed (Hi)') },

            // 26
            { type: 'speaking', render: () => Mechanics.Speaking('sp1', 'You arrive at an English-speaking party. Someone approaches and says: "Hello, what\'s your name?". Reply.', 'Yourself', 'Hi, my name is [Your Name]. Nice to meet you.') },

            { type: 'speaking', render: () => Mechanics.Speaking('sp2', 'You are with a 👨 male friend named "Neo". Introduce him to the people.', 'Yourself', 'Hello. His name is Neo.') },

            // 29
            { type: 'speaking', render: () => Mechanics.Speaking('sp3', 'The party is over. Say goodbye to the people you just met.', 'Yourself', 'Goodbye. Nice to meet you.') },
            
            // --- CLEAR ---
            // 30
            { type: 'clear', render: () => Mechanics.Clear(), onRender: () => {
                document.getElementById('final-xp').innerText = state.xp;
                document.getElementById('final-hp').innerText = `${state.hp}%`;
                if(state.hp === 100) document.getElementById('final-hp').classList.add('text-spotify');
            }}
        ];

        /* --- ENGINE MECHANICS --- */
        
        function renderSlide() {
            closeIntel();
            if(slideTimer) { clearInterval(slideTimer); slideTimer = null; }
            
            const container = document.getElementById('slide-container');
            const slide = slides[state.current];
            
            // Animate transition
            container.style.opacity = 0;
            container.style.transform = 'translateY(10px)';
            container.style.transition = 'opacity 0.3s ease, transform 0.3s ease';
            
            setTimeout(() => {
                container.innerHTML = slide.render();
                if(slide.onRender) slide.onRender();
                container.style.opacity = 1;
                container.style.transform = 'translateY(0)';
                updateHUD();
            }, 300);
        }

        function nextSlide() {
            if (state.current < slides.length - 1) {
                state.current++;
                renderSlide();
            }
        }

        function prevSlide() {
            if (state.current > 0) {
                state.current--;
                renderSlide();
            }
        }

        // Bug Hunter Logic
        function handleBugHunter(id, clickIndex, bugIndex, correctWord) {
            const el = document.getElementById(`bh-word-${id}-${clickIndex}`);
            if (clickIndex === bugIndex) {
                gainXP(80, 'Mistake found and fixed.');
                el.innerHTML = `<i class="fa-solid fa-wand-magic-sparkles text-sm mr-1"></i>${correctWord}`;
                el.style.color = '#1DB954';
                setTimeout(nextSlide, 1500);
            } else {
                takeDamage(15, 'This word is correct.');
                el.style.color = '#E50914';
                setTimeout(() => el.style.color = '', 1000);
            }
        }

        // Builder Logic
        function handleBuilderClick(element, id) {
            const word = element.getAttribute('data-word');
            const drop = document.getElementById(`builder-drop-${id}`);
            const bank = document.getElementById(`builder-bank-${id}`);
            
            if (element.parentElement.id === `builder-bank-${id}`) {
                drop.appendChild(element);
                element.classList.add('selected');
            } else {
                bank.appendChild(element);
                element.classList.remove('selected');
            }

            if (drop.children.length > 0) {
                document.getElementById(`builder-verify-${id}`).classList.remove('hidden');
            } else {
                document.getElementById(`builder-verify-${id}`).classList.add('hidden');
            }
        }

        function verifyBuilder(id) {
            const drop = document.getElementById(`builder-drop-${id}`);
            const sentence = Array.from(drop.children).map(c => c.getAttribute('data-word')).join(' ');
            
            if (sentence === state.builderTarget) {
                gainXP(100, 'Sentence built perfectly.');
                drop.style.borderColor = '#1DB954';
                drop.style.backgroundColor = 'rgba(29,185,84,0.1)';
                setTimeout(nextSlide, 1500);
            } else {
                takeDamage(15, 'Incorrect order.');
                drop.classList.add('animate-error');
                setTimeout(() => drop.classList.remove('animate-error'), 400);
            }
        }

        // Slot Machine Logic
        function cycleSlot(id) {
            const btn = document.getElementById(`slot-btn-${id}`);
            const opts = btn.getAttribute('data-opts').split(',');
            let idx = parseInt(btn.getAttribute('data-index'));
            idx = (idx + 1) % opts.length;
            btn.setAttribute('data-index', idx);
            btn.innerHTML = `${opts[idx]} <i class="fa-solid fa-sort text-sm opacity-50 ml-2"></i>`;
        }

        function verifySlot(id, correct) {
            const btn = document.getElementById(`slot-btn-${id}`);
            const currentVal = btn.innerText.trim();
            if (currentVal === correct) {
                gainXP(80, 'Excellent choice.');
                btn.style.backgroundColor = '#1DB954';
                btn.style.color = '#000';
                setTimeout(nextSlide, 1500);
            } else {
                takeDamage(20, 'Incorrect option.');
                btn.classList.add('animate-error');
                setTimeout(() => btn.classList.remove('animate-error'), 400);
            }
        }

        // Terminal Auth Logic
        function verifyAuth(id, playerChoice, actualValidity) {
            const card = document.getElementById(`auth-card-${id}`);
            if (playerChoice === actualValidity) {
                gainXP(90, 'Analysis correct.');
                card.style.borderColor = '#1DB954';
                card.style.color = '#1DB954';
                setTimeout(nextSlide, 1500);
            } else {
                takeDamage(25, 'Analysis incorrect.');
                card.classList.add('animate-error');
                setTimeout(nextSlide, 1500);
            }
        }

        // Dialogue Wheel Logic
        function verifyWheel(id, selectedIdx, correctIdx) {
            if (selectedIdx === correctIdx) {
                gainXP(120, 'Great communication skill.');
                setTimeout(nextSlide, 1000);
            } else {
                takeDamage(10, 'A bit weird for the context.');
            }
        }

        // Initialization
        window.onload = () => {
            initWhiteboard();
            renderSlide();
        };

    </script>
